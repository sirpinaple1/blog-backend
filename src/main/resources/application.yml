server:
  port: ${PORT:8080}

spring:
  application:
    name: blog-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  level:
    com.blog: debug
