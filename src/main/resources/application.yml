server:
  port: ${PORT:8080}

spring:
  application:
    name: blog-system
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATABASE_URL}
  servlet:
    multipart:
      max-file-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.blog: debug
